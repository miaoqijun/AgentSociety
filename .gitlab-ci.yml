stages:
  - lint
  - test
  - build
  - release

variables:
  PYTHON_VERSION: "3.12"
  UV_INDEX_URL: "https://pypi.tuna.tsinghua.edu.cn/simple"
  MEM0_TELEMETRY: "False"
  ANONYMIZED_TELEMETRY: "False"

# CI scope: AgentSociety2 + extension + frontend only.
# Legacy packages (agentsociety v1, community, benchmark) are excluded.

.python_changes: &python_changes
  - packages/agentsociety2/**/*
  - pyproject.toml
  - uv.lock
  - .gitlab-ci.yml

lint:
  stage: lint
  image: python:3.12
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
      changes: *python_changes
    - if: $CI_COMMIT_BRANCH == "main"
      changes: *python_changes
  before_script:
    - pip install uv
    - cd packages/agentsociety2 && uv sync --extra dev
  script:
    - uv run ruff check .
    - uv run mypy tests/ --follow-imports=skip

lint-extension:
  stage: lint
  image: node:22
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
      changes:
        - extension/**/*
        - .gitlab-ci.yml
    - if: $CI_COMMIT_BRANCH == "main"
      changes:
        - extension/**/*
        - .gitlab-ci.yml
  before_script:
    - cd extension && npm ci
  script:
    - npm run lint
    - npm run build
    - npm audit --audit-level=high

lint-frontend:
  stage: lint
  image: node:22
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
      changes:
        - frontend/**/*
        - .gitlab-ci.yml
    - if: $CI_COMMIT_BRANCH == "main"
      changes:
        - frontend/**/*
        - .gitlab-ci.yml
  before_script:
    - cd frontend && npm ci
  script:
    - npm run lint
    - npm run build
    - npm audit --audit-level=high

test:
  stage: test
  image: python:$PYTHON_VERSION
  needs: [lint]
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
      changes: *python_changes
    - if: $CI_COMMIT_BRANCH == "main"
      changes: *python_changes
  parallel:
    matrix:
      - PYTHON_VERSION: ["3.11", "3.12", "3.13"]
  before_script:
    - pip install uv
    - cd packages/agentsociety2 && uv sync --extra dev
  script:
    - |
      uv run pytest -v \
        --junitxml=junit.xml \
        -o junit_family=xunit2 \
        -o junit_suite_name="agentsociety2-py${PYTHON_VERSION}"
  artifacts:
    when: always
    expire_in: 30 days
    paths:
      - packages/agentsociety2/junit.xml
    reports:
      junit: packages/agentsociety2/junit.xml
  variables:
    AGENTSOCIETY_LLM_API_KEY: $AGENTSOCIETY_LLM_API_KEY
    AGENTSOCIETY_LLM_API_BASE: $AGENTSOCIETY_LLM_API_BASE
    AGENTSOCIETY_LLM_MODEL: glm-5

build-docker-image:
  tags:
    - dind
  stage: build
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
      changes:
        - Dockerfile
        - packages/agentsociety2/**/*
        - extension/**/*
        - frontend/**/*
    - if: $CI_COMMIT_BRANCH == "main"
      changes:
        - Dockerfile
        - packages/agentsociety2/**/*
        - extension/**/*
        - frontend/**/*
  script:
    - export TIME=$(date +%s)
    - |
      if [[ "$CI_PIPELINE_SOURCE" == "merge_request_event" ]]; then
        echo "MR pipeline - build only for validation"
        docker build -t ${CI_REGISTRY_IMAGE}:mr-${CI_MERGE_REQUEST_IID} .
      else
        echo "Main branch - build and push"
        docker login -u ${CI_REGISTRY_USER} -p ${CI_REGISTRY_PASSWORD} ${CI_REGISTRY}
        docker build -t ${CI_REGISTRY_IMAGE}:v2-${CI_COMMIT_SHORT_SHA}-${TIME} -t ${CI_REGISTRY_IMAGE}:v2 .
        docker push ${CI_REGISTRY_IMAGE}:v2-${CI_COMMIT_SHORT_SHA}-${TIME}
        docker push ${CI_REGISTRY_IMAGE}:v2
      fi

mirror-to-github:
  stage: release
  image: alpine:3.21
  rules:
    - if: $CI_COMMIT_BRANCH == "main"
    - if: $CI_COMMIT_TAG =~ /^agentsociety2-v[0-9]+/
  variables:
    GIT_STRATEGY: clone
    GIT_DEPTH: 0
  before_script:
    - apk add --no-cache git openssh-client
  script:
    - |
      if [ -z "${GITHUB_DEPLOY_KEY}" ]; then
        echo "GITHUB_DEPLOY_KEY is not set; skipping GitHub mirror."
        exit 0
      fi
      mkdir -p ~/.ssh
      chmod 700 ~/.ssh
      if [ -f "${GITHUB_DEPLOY_KEY}" ]; then
        DEPLOY_KEY_FILE="${GITHUB_DEPLOY_KEY}"
      else
        DEPLOY_KEY_FILE=~/.ssh/id_ed25519
        printf '%s\n' "$GITHUB_DEPLOY_KEY" | tr -d '\r' > "${DEPLOY_KEY_FILE}"
      fi
      chmod 600 "${DEPLOY_KEY_FILE}"
      ssh-keyscan -t rsa,ecdsa,ed25519 github.com >> ~/.ssh/known_hosts 2>/dev/null
      chmod 644 ~/.ssh/known_hosts
      export GIT_SSH_COMMAND="ssh -i ${DEPLOY_KEY_FILE} -o IdentitiesOnly=yes -o StrictHostKeyChecking=yes"
      git remote add github "git@github.com:tsinghua-fib-lab/AgentSociety.git" \
        || git remote set-url github "git@github.com:tsinghua-fib-lab/AgentSociety.git"
      if [ -n "${CI_COMMIT_TAG}" ]; then
        git push github "${CI_COMMIT_TAG}"
      elif [ "${CI_COMMIT_BRANCH}" = "main" ]; then
        git push github HEAD:main
      fi

generate-changelog:
  stage: release
  image: rust:slim
  rules:
    - if: $CI_COMMIT_TAG =~ /^agentsociety2-v[0-9]+/
  variables:
    GIT_STRATEGY: clone
    GIT_DEPTH: 0
  before_script:
    - apt-get update && apt-get install -y --no-install-recommends git && rm -rf /var/lib/apt/lists/*
    - cargo install git-cliff
  script:
    - |
      CHANGELOG_BODY=$(git-cliff --latest --strip header --config cliff.toml)
      echo "$CHANGELOG_BODY" > release_notes.md
      echo "=== Generated Release Notes ==="
      head -50 release_notes.md
  artifacts:
    paths:
      - release_notes.md
    expire_in: 7 days

create-release:
  stage: release
  image: registry.gitlab.com/gitlab-org/release-cli:latest
  needs: [generate-changelog]
  rules:
    - if: $CI_COMMIT_TAG =~ /^agentsociety2-v[0-9]+/
  script:
    - echo "Creating GitLab release for ${CI_COMMIT_TAG}"
  release:
    name: "AgentSociety2 ${CI_COMMIT_TAG}"
    description: "$(cat release_notes.md)"
    tag_name: "${CI_COMMIT_TAG}"
    ref: "${CI_COMMIT_SHA}"
