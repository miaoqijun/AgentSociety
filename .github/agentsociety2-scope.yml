# AgentSociety2 active development scope.
# CI, security scanning, and dependency bots should focus on these paths only.
#
# Out of scope (legacy / archived in this monorepo):
#   - packages/agentsociety          (v1.x legacy)
#   - packages/agentsociety-community
#   - packages/agentsociety-benchmark
#   - docs_v1

paths:
  python:
    - packages/agentsociety2
    - pyproject.toml
    - uv.lock
  extension:
    - extension
  frontend:
    - frontend
  workflows:
    - .github/workflows/ci.yml
    - .github/workflows/extension-ci.yml
    - .github/workflows/frontend-ci.yml
    - .github/workflows/agentsociety2-publish.yml
    - .github/workflows/dependency-review.yml
    - .github/workflows/codeql.yml
    - .github/codeql/codeql-config.yml

legacy_paths:
  - packages/agentsociety
  - packages/agentsociety-community
  - packages/agentsociety-benchmark
  - docs_v1
