name: "AgentSociety CodeQL config"

# Scan only AgentSociety2 active code (see .github/agentsociety2-scope.yml).
paths:
  - extension/src
  - frontend/src
  - packages/agentsociety2/agentsociety2

paths-ignore:
  - frontend/public/monaco-editor
  - packages/agentsociety
  - packages/agentsociety-community
  - packages/agentsociety-benchmark
  - docs_v1
  - "**/tests/**"
  - "**/node_modules/**"
  - "**/.venv/**"
