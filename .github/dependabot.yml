# Dependabot version updates — AgentSociety2 scope only.
#
# Legacy packages (agentsociety v1, community, benchmark) are intentionally
# excluded. Their lockfiles may still appear in GitHub Security advisories;
# dismiss or auto-triage those alerts in repo settings if needed.

version: 2

updates:
  - package-ecosystem: pip
    directory: /packages/agentsociety2
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    labels:
      - agentsociety2
      - dependencies

  - package-ecosystem: npm
    directory: /extension
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    labels:
      - extension
      - dependencies

  - package-ecosystem: npm
    directory: /frontend
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    labels:
      - frontend
      - dependencies

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    labels:
      - ci
      - dependencies
