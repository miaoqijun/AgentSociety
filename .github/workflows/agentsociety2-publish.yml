name: Publish to PyPI

on:
  push:
    tags:
      - 'agentsociety2-v*'

permissions:
  contents: read
  id-token: write  # Required for trusted publishing

jobs:
  build-python:
    name: Build Python distribution
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install build dependencies
        run: |
          python -m pip install --upgrade pip
          pip install build twine

      - name: Build package
        run: |
          cd packages/agentsociety2
          python -m build

      - name: Check distribution
        run: |
          twine check packages/agentsociety2/dist/*

      - name: Store the distribution packages
        uses: actions/upload-artifact@v4
        with:
          name: python-package-distributions
          path: packages/agentsociety2/dist/

  build-vscode:
    name: Build VSCode extension
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: extension/package-lock.json

      - name: Install dependencies
        working-directory: ./extension
        run: npm ci

      - name: Validate webpack config
        working-directory: ./extension
        run: node -c webpack.config.js

      - name: Build extension
        working-directory: ./extension
        run: npm run build

      - name: Package extension
        working-directory: ./extension
        run: npm run package

      - name: Verify VSIX contents
        working-directory: ./extension
        run: |
          unzip -Z1 ai-social-scientist.vsix > vsix-contents.txt
          grep -q '^extension/out/extension.js$' vsix-contents.txt
          grep -q '^extension/out/webview/configPage.js$' vsix-contents.txt
          grep -q '^extension/out/webview/initConfig.js$' vsix-contents.txt
          grep -q '^extension/out/webview/prefillParams.js$' vsix-contents.txt
          grep -q '^extension/out/webview/replay.js$' vsix-contents.txt
          grep -q '^extension/out/webview/simSettings.js$' vsix-contents.txt
          grep -q '^extension/node_modules/js-yaml/index.js$' vsix-contents.txt

      - name: Store the VSIX package
        uses: actions/upload-artifact@v4
        with:
          name: vscode-extension
          path: extension/ai-social-scientist.vsix

  publish-to-pypi:
    name: Publish to PyPI
    needs: build-python
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/agentsociety2

    steps:
      - name: Download all the dists
        uses: actions/download-artifact@v4
        with:
          name: python-package-distributions
          path: dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          # For trusted publishing, no username/password needed
          # Make sure to configure trusted publishing on PyPI:
          # https://docs.pypi.org/trusted-publishers/
          skip-existing: true

  github-release:
    name: Create GitHub Release
    needs: [publish-to-pypi, build-vscode]
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download Python distributions
        uses: actions/download-artifact@v4
        with:
          name: python-package-distributions
          path: python-dist/

      - name: Download VSCode extension
        uses: actions/download-artifact@v4
        with:
          name: vscode-extension
          path: vscode-dist/

      - name: Extract version from tag
        id: get_version
        run: |
          TAG=${{ github.ref_name }}
          VERSION=${TAG#agentsociety2-v}
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Generate release notes
        id: release_notes
        run: |
          # Get commit messages since last tag
          PREV_TAG=$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || echo "")
          if [ -n "$PREV_TAG" ]; then
            echo "## What's Changed" > release_notes.md
            git log ${PREV_TAG}..HEAD --oneline --no-merges | sed 's/^/- /' >> release_notes.md
          else
            echo "## What's Changed" > release_notes.md
            git log --oneline --no-merges -10 | sed 's/^/- /' >> release_notes.md
          fi

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: AgentSociety2 ${{ steps.get_version.outputs.version }}
          body_path: release_notes.md
          files: |
            python-dist/*.tar.gz
            python-dist/*.whl
            vscode-dist/*.vsix
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
