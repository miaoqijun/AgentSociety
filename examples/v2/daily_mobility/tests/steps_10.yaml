- type: questionnaire
  questionnaire_id: daily_mobility_intention_slot_0
  title: Daily mobility intention (15 min)
  description: ''
  questions:
  - id: primary_intention
    prompt: 'Use the **simulation clock** shown in your current system context as
      the wall time.

      You are answering for daily-mobility **time slot 1 of 48** (48 consecutive 15-minute
      periods that cover the simulated day).

      Based on your **current memory, workspace notes, and earlier steps today**,
      what is your **primary activity intention** for this 15-minute period?

      Category definitions (use these strictly):
      - sleep: in bed asleep, including night and naps.
      - home activity: at home, including meals cooked or eaten at home.
      - work: working, commuting as part of the workday, or taking a short break while work remains the main activity.
      - shopping: at shops/markets/malls to buy goods.
      - eating out: the main activity is visiting an outside restaurant/cafe/bar or similar food venue.
      - leisure and entertainment: parks, gyms, cinemas, social outings, hobbies away from home.
      - other: transit between locations, errands, medical visits, or anything not above.

      Being hungry is a body state, not an activity label. Eating out is not all meals.

      Choose exactly ONE option (copy the phrase exactly): sleep, home activity, work,
      shopping, eating out, leisure and entertainment, other.'
    response_type: choice
    choices:
    - sleep
    - home activity
    - work
    - shopping
    - eating out
    - leisure and entertainment
    - other
