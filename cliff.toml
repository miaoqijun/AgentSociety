# git-cliff configuration
# https://git-cliff.org/docs/configuration
#
# Usage:
#   git-cliff                           # generate changelog from all tags
#   git-cliff --latest                  # generate changelog for the latest tag only
#   git-cliff --unreleased              # generate changelog for unreleased changes
#   git-cliff -o CHANGELOG.md           # overwrite CHANGELOG.md
#   git-cliff --tag agentsociety2-v2.4.0 --unreleased  # preview a specific version

[changelog]
header = """
# Changelog\n
"""
body = """
{% if version %}\
    {% if previous.version %}\
        ## [{{ version | trim_start_matches(pat="agentsociety2-v") }}] - {{ timestamp | date(format="%Y-%m-%d") }}
    {% else %}
        ## [{{ version | trim_start_matches(pat="agentsociety2-v") }}] - {{ timestamp | date(format="%Y-%m-%d") }}
    {% endif %}\
{% else %}\
    ## [Unreleased]
{% endif %}\
{% for group, commits in commits | group_by(attribute="group") %}
    ### {{ group | striptags | trim }}
    {% for commit in commits %}
        - {% if commit.scope %}**{{ commit.scope }}**: {% endif %}\
            {{ commit.message | upper_first }}\
            {% if commit.breaking %} (**BREAKING**){% endif %}\
    {% endfor %}
{% endfor %}\n
"""
trim = true
footer = """
<!-- Generated by git-cliff -->
"""

[git]
conventional_commits = true
filter_unconventional = true
split_commits = false
commit_parsers = [
    { message = "^feat", group = "<!-- 0 -->Added" },
    { message = "^fix", group = "<!-- 1 -->Fixed" },
    { message = "^perf", group = "<!-- 2 -->Performance" },
    { message = "^refactor", group = "<!-- 3 -->Changed" },
    { message = "^docs?", group = "<!-- 4 -->Documentation" },
    { message = "^style", group = "<!-- 4 -->Documentation" },
    { message = "^test", group = "<!-- 5 -->Testing" },
    { message = "^chore", group = "<!-- 6 -->Internal" },
    { message = "^ci", group = "<!-- 6 -->Internal" },
    { body = ".*security", group = "<!-- 7 -->Security" },
    { message = "^Merge", skip = true },
]
protect_breaking_commits = false
filter_commits = true
tag_pattern = "agentsociety2-v[0-9]*"
sort_commits = "oldest"
