[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "agentsociety-community"
version = "0.3.3"
description = "A community library for customizing agent/block for AgentSociety"
authors = [
    { name = "Jun Zhang", email = "zhangjun990222@gmail.com" },
]
license = { file = "LICENSE" }
readme = "README.md"
classifiers = [
    "Programming Language :: Python :: 3",
    "Operating System :: POSIX :: Linux",
    "Operating System :: MacOS :: MacOS X",
]
requires-python = ">=3.11"
dependencies = [
    "agentsociety>=1.5.7,<2",
]

[[tool.uv.index]]
name = "tuna"
url = "https://pypi.tuna.tsinghua.edu.cn/simple"
default = true

[tool.uv]
override-dependencies = [
    "urllib3>=2.7.0",
    "pillow>=11.3.0",
    "python-multipart>=0.0.27",
    "protobuf>=4.25.8,<5",
    "starlette>=0.49.1,<1",
    "aiohttp>=3.11.18",
    "pyasn1>=0.6.3",
    "ray[default]>=2.52.0",
    "requests>=2.32.5",
    "grpcio>=1.71.0,<2",
]

[project.urls]
Homepage = "https://github.com/tsinghua-fib-lab/agentsociety-community"
Repository = "https://github.com/tsinghua-fib-lab/agentsociety-community.git"
Issues = "https://github.com/tsinghua-fib-lab/agentsociety-community/issues"
